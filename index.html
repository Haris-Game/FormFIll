<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Landing Page Replica</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{background:radial-gradient(circle at 30% 10%,#12213d,#060b18 65%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.wrap{width:1180px;max-width:95%;display:grid;grid-template-columns:1fr 420px;gap:70px;align-items:center}
.small{color:#59b4ff;font-size:11px;letter-spacing:3px;text-transform:uppercase}
h1{font-size:64px;line-height:1.05;margin:18px 0 20px;font-weight:800;max-width:520px}
p{color:#9ba7b8;max-width:470px}
.tags{display:flex;gap:12px;margin:28px 0}
.tag,.insta{border:1px solid #2b3447;border-radius:999px;padding:10px 16px;color:#d9e0ec;font-size:13px;display:inline-block}
.mail{margin:28px 0 10px;color:#d9e0ec}
.card{background:rgba(22,28,44,.95);border:1px solid #2a3245;border-radius:18px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.card h4{color:#59b4ff;font-size:11px;letter-spacing:3px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
label{font-size:11px;color:#9aa5b5;margin-bottom:6px;display:block}
input,select{width:100%;background:#070b16;border:1px solid #111827;color:#fff;padding:12px;border-radius:10px}
.full{grid-column:1/-1}
button{width:100%;margin-top:16px;border:0;padding:15px;border-radius:10px;background:#37d6ff;font-weight:700}
.note{text-align:center;color:#7f8a99;font-size:11px;margin-top:8px}
@media(max-width:900px){.wrap{grid-template-columns:1fr}h1{font-size:46px}}
</style>
</head>



<body>
<div class="wrap">
<div>
<div class="small">READY TO SCALE</div>
<h1>Your next winning ad creative is 48 hours away.</h1>
<p>Tell us about your brand — our team will reach out with the next steps.</p>
<div class="tags"><span class="tag">No long-term lock-in</span><span class="tag">Fast first delivery</span></div>
<div class="mail">Mail: contact@crevzo.com</div>
<div class="insta">Instagram</div>
</div>
<div class="card">
<h4>TAKES LESS THAN 30 SECONDS</h4>

<form action="https://formsubmit.co/harisdon014@gmail.com" method="POST">

<div class="grid">
<div>
<label>Full Name *</label>
<input type="text" name="name" required>
</div>

<div>
<label>Email *</label>
<input type="email" name="email" required>
</div>

<div>
<label>WhatsApp Number *</label>
<input type="tel" name="whatsapp" required>
</div>

<div>
<label>Brand / Company *</label>
<input type="text" name="company" required>
</div>

<div class="full">
<label>Website / Product link *</label>
<input type="url" name="website" required>
</div>

<div class="full">
<label>Pricing Plan</label>
<select name="plan" required>
<option value="">Select Plan</option>
<option>Basic</option>
<option>Standard</option>
<option>Premium</option>
</select>
</div>

<div class="full">
<label>Solve: 3 + 5</label>
<input type="number" name="captcha" required id="captcha">
</div>

</div>

<button type="submit">Get Started</button>

<div class="note">
We will never spam you. No contracts. No commitments.
</div>

</form>
</div>
</div>
</body>
</html>
